name: Release to PyPI

# Publishes on a GitHub Release. Uses PyPI Trusted Publishing (OIDC) -- no API
# token. One-time setup on PyPI: add a pending publisher for project
# "optimum-interval", owner "tunnell", repo "optimum_interval",
# workflow "release.yml", environment "pypi"; and create a GitHub environment
# named "pypi".

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - uses: pypa/gh-action-pypi-publish@release/v1
